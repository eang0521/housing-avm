name: CI

on:
  pull_request:
    branches:
      - main  # Change to your default branch if it's different

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'  # You can choose the Python version you need

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # Specify your requirements file

      - name: Run tests
        run: |
          pytest  # Ensure pytest is available in your requirements
